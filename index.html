<body>
    <div class="instructions" id="instructions">
        <h3>✨ Magical Birthday Experience ✨</h3>
        <p><strong>No setup needed!</strong> Point your camera at any surface and create your personalized 3D birthday celebration!</p>
        <p><em>Best experienced with good lighting 💡</em></p>
    </div>
    
    <div class="loading" id="loading" style="display: none;">
        <div>🎉 Preparing your magical surprise...</div>
        <div style="margin-top: 10px; font-size: 16px; opacity: 0.8;">Point at any flat surface</div>
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    <div class="tap-hint" id="tapHint">
        ✨ Tap to place your birthday magic! ✨
    </div>
    
    <div class="controls" id="controls">
        <button class="control-btn" id="resetBtn" title="Reset">🔄</button>
        <button class="control-btn" id="captureBtn" title="Capture">📸</button>
    </div>
    
    <div class="message-overlay" id="messageOverlay"></div>
    
    <button class="start-button" id="startButton">✨ Start The Magic ✨</button>
    
    <div id="ar-container">
        <canvas id="ar-canvas"></canvas>
        <div class="photo-frame" id="photoFrame">
            <img src="./test.jpeg" alt="Birthday Girl" id="birthdayPhoto">
        </div>
    </div>
    
    <div class="celebration-overlay" id="celebrationOverlay"></div>
    
    <script>
        let scene, camera, renderer, arObjects = [];
        let isARActive = false;
        let animationFrameId;
        let hasPlacedSurprise = false;
        let currentBirthdayScene = null;
        
        const startButton = document.getElementById('startButton');
        const instructions = document.getElementById('instructions');
        const loading = document.getElementById('loading');
        const arContainer = document.getElementById('ar-container');
        const tapHint = document.getElementById('tapHint');
        const photoFrame = document.getElementById('photoFrame');
        const controls = document.getElementById('controls');
        const resetBtn = document.getElementById('resetBtn');
        const captureBtn = document.getElementById('captureBtn');
        const messageOverlay = document.getElementById('messageOverlay');
        const celebrationOverlay = document.getElementById('celebrationOverlay');
        
        const HER_PHOTO_URL = "./test.jpeg";
        
        startButton.addEventListener('click', initializeAR);
        resetBtn.addEventListener('click', resetExperience);
        captureBtn.addEventListener('click', capturePhoto);
        
        function initializeAR() {
            startButton.style.display = 'none';
            instructions.style.display = 'none';
            loading.style.display = 'block';
            
            setTimeout(() => {
                loading.style.display = 'none';
                arContainer.style.display = 'block';
                tapHint.style.display = 'block';
                controls.style.display = 'block';
                setupThreeJS();
                startARExperience();
            }, 2500);
        }
        
        function setupThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('ar-canvas'), 
                alpha: true,
                antialias: true,
                preserveDrawingBuffer: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Enhanced lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(2, 2, 2);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // Add some colored lights for atmosphere
            const pinkLight = new THREE.PointLight(0xff6b9d, 0.5, 10);
            pinkLight.position.set(-3, 2, 0);
            scene.add(pinkLight);
            
            const blueLight = new THREE.PointLight(0x667eea, 0.5, 10);
            blueLight.position.set(3, 2, 0);
            scene.add(blueLight);
            
            camera.position.z = 5;
        }
        
        function createBirthdayScene(position) {
            const group = new THREE.Group();
            
            // Enhanced main text
            const textGeometry = new THREE.PlaneGeometry(4, 1.2);
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 1024;
            canvas.height = 256;
            
            // Create gradient background
            const gradient = context.createLinearGradient(0, 0, 1024, 0);
            gradient.addColorStop(0, '#ff6b9d');
            gradient.addColorStop(0.5, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            
            context.fillStyle = gradient;
            context.fillRect(0, 0, 1024, 256);
            
            // Add text with shadow
            context.shadowColor = 'rgba(0,0,0,0.3)';
            context.shadowBlur = 10;
            context.shadowOffsetX = 5;
            context.shadowOffsetY = 5;
            
            context.fillStyle = 'white';
            context.font = 'bold 64px Poppins, Arial';
            context.textAlign = 'center';
            context.fillText('HAPPY BIRTHDAY', 512, 80);
            context.fillText('BEAUTIFUL! 💖', 512, 160);
            
            const textTexture = new THREE.CanvasTexture(canvas);
            const textMaterial = new THREE.MeshBasicMaterial({ 
                map: textTexture, 
                transparent: true,
                alphaTest: 0.1
            });
            
            const textMesh = new THREE.Mesh(textGeometry, textMaterial);
            textMesh.position.set(0, 2.5, 0);
            group.add(textMesh);
            
            // Enhanced floating hearts with different colors
            const heartData = [
                { pos: [2.5, 2, 0], emoji: '💖', scale: 1, color: '#ff1493' },
                { pos: [-2.5, 2.3, 0.8], emoji: '💕', scale: 0.8, color: '#ff69b4' },
                { pos: [2, 1, -0.8], emoji: '💗', scale: 0.9, color: '#ff91a4' },
                { pos: [-2, 1.5, 1], emoji: '💓', scale: 0.7, color: '#ffb6c1' },
                { pos: [0, 3.5, 0], emoji: '💖', scale: 0.6, color: '#ff1493' }
            ];
            
            heartData.forEach((heart, index) => {
                const heartMesh = createEnhancedEmojiMesh(heart.emoji, heart.scale, heart.color);
                heartMesh.position.set(...heart.pos);
                heartMesh.userData = { 
                    originalY: heart.pos[1], 
                    floatSpeed: 0.02 + index * 0.008,
                    floatRange: 0.8,
                    rotationSpeed: 0.005 + index * 0.002
                };
                group.add(heartMesh);
            });
            
            // Enhanced flowers
            const flowerData = [
                { pos: [3.5, 2.8, -1.2], emoji: '🌸', scale: 0.8, color: '#ffb6c1' },
                { pos: [-3.8, 3, 1], emoji: '🌹', scale: 0.9, color: '#ff1493' },
                { pos: [3.2, 0.8, 1.2], emoji: '🌺', scale: 0.7, color: '#ff69b4' },
                { pos: [-3.5, 1.2, -1], emoji: '🌷', scale: 0.8, color: '#ff91a4' }
            ];
            
            flowerData.forEach((flower, index) => {
                const flowerMesh = createEnhancedEmojiMesh(flower.emoji, flower.scale, flower.color);
                flowerMesh.position.set(...flower.pos);
                flowerMesh.userData = { 
                    rotationSpeed: 0.015 + index * 0.005,
                    bobSpeed: 0.01 + index * 0.003,
                    originalY: flower.pos[1]
                };
                group.add(flowerMesh);
            });
            
            // Enhanced birthday cake with glow
            const cakeMesh = createEnhancedEmojiMesh('🎂', 1.5, '#ffgold');
            cakeMesh.position.set(0, -1, 0);
            cakeMesh.userData = { 
                rotationSpeed: 0.01,
                pulseSpeed: 0.02
            };
            group.add(cakeMesh);
            
            // Enhanced balloons
            const balloonData = [
                { pos: [4, 4, 0.5], scale: 1.2, color: '#ff6b9d' },
                { pos: [-4, 3.8, -0.5], scale: 1.1, color: '#667eea' },
                { pos: [4.5, 2.5, 1], scale: 1, color: '#764ba2' }
            ];
            
            balloonData.forEach((balloon, index) => {
                const balloonMesh = createEnhancedEmojiMesh('🎈', balloon.scale, balloon.color);
                balloonMesh.position.set(...balloon.pos);
                balloonMesh.userData = { 
                    originalY: balloon.pos[1],
                    floatSpeed: 0.012 + index * 0.004,
                    floatRange: 0.5,
                    swaySpeed: 0.008 + index * 0.002,
                    swayRange: 0.3
                };
                group.add(balloonMesh);
            });
            
            // Enhanced sparkles
            const sparklePositions = [
                { pos: [1.5, 4, 1.5], scale: 0.5 },
                { pos: [-1.8, 3.8, -1.2], scale: 0.4 },
                { pos: [0, 4.2, 0.8], scale: 0.6 },
                { pos: [2.2, 1.5, -1.8], scale: 0.35 },
                { pos: [-2.5, 2.2, 1.5], scale: 0.45 }
            ];
            
            sparklePositions.forEach((sparkle, index) => {
                const sparkleMesh = createEnhancedEmojiMesh('✨', sparkle.scale, '#ffgold');
                sparkleMesh.position.set(...sparkle.pos);
                sparkleMesh.userData = { 
                    originalY: sparkle.pos[1],
                    floatSpeed: 0.03 + index * 0.008,
                    floatRange: 1,
                    twinkleSpeed: 0.05 + index * 0.01
                };
                group.add(sparkleMesh);
            });
            
            group.position.copy(position);
            group.userData = { celebrationTime: Date.now() };
            return group;
        }
        
        function createEnhancedEmojiMesh(emoji, scale = 0.5, glowColor = '#ffffff') {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 128;
            canvas.height = 128;
            
            // Add glow effect
            context.shadowColor = glowColor;
            context.shadowBlur = 20;
            
            context.font = '96px Arial';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(emoji, 64, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ 
                map: texture, 
                transparent: true,
                alphaTest: 0.1
            });
            const geometry = new THREE.PlaneGeometry(scale, scale);
            
            return new THREE.Mesh(geometry, material);
        }
        
        function startARExperience() {
            isARActive = true;
            
            arContainer.addEventListener('click', (event) => {
                if (hasPlacedSurprise) {
                    showMessage("✨ Your surprise is already here! Use reset to create a new one ✨");
                    return;
                }
                
                const rect = arContainer.getBoundingClientRect();
                const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                const vector = new THREE.Vector3(x, y, -1);
                vector.unproject(camera);
                
                const distance = 4;
                const position = camera.position.clone().add(
                    vector.sub(camera.position).normalize().multiplyScalar(distance)
                );
                
                currentBirthdayScene = createBirthdayScene(position);
                scene.add(currentBirthdayScene);
                arObjects.push(currentBirthdayScene);
                
                // Enhanced photo frame appearance
                photoFrame.style.display = 'block';
                photoFrame.style.left = Math.min(Math.max(event.clientX - 125, 20), window.innerWidth - 270) + 'px';
                photoFrame.style.top = Math.min(Math.max(event.clientY - 125, 20), window.innerHeight - 270) + 'px';
                
                const photo = document.getElementById('birthdayPhoto');
                if (HER_PHOTO_URL && !HER_PHOTO_URL.includes('svg')) {
                    photo.src = HER_PHOTO_URL;
                }
                
                tapHint.style.display = 'none';
                hasPlacedSurprise = true;
                
                // Celebration animation
                photoFrame.style.transform = 'scale(0) rotate(10deg)';
                photoFrame.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                setTimeout(() => {
                    photoFrame.style.transform = 'scale(1) rotate(0deg)';
                }, 100);
                
                // Trigger celebration particles
                triggerCelebration();
                showMessage("🎉 Happy Birthday Beautiful! 🎉", 3000);
            });
            
            animate();
        }
        
        function triggerCelebration() {
            celebrationOverlay.style.display = 'block';
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'celebration-particle';
                    particle.style.left = Math.random() * window.innerWidth + 'px';
                    particle.style.bottom = '0px';
                    particle.style.animationDelay = (Math.random() * 2) + 's';
                    celebrationOverlay.appendChild(particle);
                    
                    setTimeout(() => {
                        particle.remove();
                    }, 3000);
                }, i * 100);
            }
            
            setTimeout(() => {
                celebrationOverlay.style.display = 'none';
            }, 5000);
        }
        
        function animate() {
            if (!isARActive) return;
            
            const time = Date.now() * 0.001;
            
            arObjects.forEach(group => {
                group.children.forEach((child, index) => {
                    const userData = child.userData;
                    
                    if (userData.floatSpeed) {
                        child.position.y = userData.originalY + 
                            Math.sin(time * userData.floatSpeed) * userData.floatRange;
                    }
                    
                    if (userData.rotationSpeed) {
                        child.rotation.z += userData.rotationSpeed;
                    }
                    
                    if (userData.swaySpeed) {
                        child.position.x += Math.sin(time * userData.swaySpeed) * userData.swayRange * 0.01;
                    }
                    
                    if (userData.twinkleSpeed) {
                        child.material.opacity = 0.7 + Math.sin(time * userData.twinkleSpeed) * 0.3;
                    }
                    
                    if (userData.pulseSpeed) {
                        const scale = 1 + Math.sin(time * userData.pulseSpeed) * 0.1;
                        child.scale.set(scale, scale, scale);
                    }
                });
                
                // Gentle rotation for the main text
                if (group.children[0]) {
                    group.children[0].rotation.y = Math.sin(time * 0.3) * 0.05;
                }
            });
            
            renderer.render(scene, camera);
            animationFrameId = requestAnimationFrame(animate);
        }
        
        function resetExperience() {
            if (currentBirthdayScene) {
                scene.remove(currentBirthdayScene);
                arObjects = arObjects.filter(obj => obj !== currentBirthdayScene);
                currentBirthdayScene = null;
            }
            
            photoFrame.style.display = 'none';
            hasPlacedSurprise = false;
            tapHint.style.display = 'block';
            
            showMessage("✨ Ready for a new surprise! ✨");
        }
        
        function capturePhoto() {
            if (!hasPlacedSurprise) {
                showMessage("📸 Place your surprise first!");
                return;
            }
            
            try {
                const dataURL = renderer.domElement.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'birthday-surprise.png';
                link.href = dataURL;
                link.click();
                showMessage("📸 Photo saved!");
            } catch (error) {
                showMessage("📸 Capture not supported on this device");
            }
        }
        
        function showMessage(text, duration = 2000) {
            messageOverlay.textContent = text;
            messageOverlay.style.display = 'block';
            messageOverlay.style.opacity = '0';
            messageOverlay.style.transform = 'translate(-50%, -50%) scale(0.8)';
            
            setTimeout(() => {
                messageOverlay.style.transition = 'all 0.3s ease';
                messageOverlay.style.opacity = '1';
                messageOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 10);
            
            setTimeout(() => {
                messageOverlay.style.opacity = '0';
                messageOverlay.style.transform = 'translate(-50%, -50%) scale(0.8)';
                setTimeout(() => {
                    messageOverlay.style.display = 'none';
                }, 300);
            }, duration);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
        });
    </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday AR Experience</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/ARButton.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }
    #info {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="info">🎉 Tap the AR button and then tap on a surface to place the magical birthday surprise! 🎉</div>
  <script>
    let camera, scene, renderer;
    let controller;
    let reticle;
    let hitTestSource = null;
    let hitTestSourceRequested = false;
    let birthdayGroup = null;
    let spawnAnimationProgress = 0;
    let isSpawning = false;
    let confettiParticles = [];

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      // Add AR button
      document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

      // Lights
      const hemiLight = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
      hemiLight.position.set(0.5, 1, 0.25);
      scene.add(hemiLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(2, 2, 2);
      scene.add(dirLight);

      // Reticle for placement
      reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
        new THREE.MeshBasicMaterial({ color: 0x00ff00 })
      );
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      // Controller for tap interaction
      controller = renderer.xr.getController(0);
      controller.addEventListener('select', onSelect);
      scene.add(controller);

      window.addEventListener('resize', onWindowResize, false);
    }

    function createBirthdayGroup() {
      const group = new THREE.Group();

      // Birthday text
      const textMesh = createText("HAPPY BIRTHDAY\nBEAUTIFUL! 💖");
      textMesh.position.set(0, 1.0, 0);
      group.add(textMesh);

      // Floating hearts
      addEmoji(group, "💖", [0.8, 1.5, 0]);
      addEmoji(group, "💕", [-0.8, 1.8, 0.2]);
      addEmoji(group, "💗", [1.2, 1.2, -0.2]);
      addEmoji(group, "💓", [-1.2, 1.4, -0.3]);

      // Flowers
      addEmoji(group, "🌸", [1.5, 2.0, -0.5]);
      addEmoji(group, "🌹", [-1.5, 2.2, 0.5]);
      addEmoji(group, "🌺", [0.5, 2.5, -0.5]);
      addEmoji(group, "🌷", [-0.5, 1.6, 0.5]);

      // Cake
      addEmoji(group, "🎂", [0, 0.2, 0], 1.5);

      // Balloons
      addEmoji(group, "🎈", [1.5, 3.0, 0]);
      addEmoji(group, "🎈", [-1.5, 3.2, 0]);
      addEmoji(group, "🎈", [0, 3.5, 0]);

      // Sparkles
      for (let i = 0; i < 15; i++) {
        addEmoji(group, "✨", [Math.random()*2-1, 2+Math.random()*1.5, Math.random()*2-1], 0.4);
      }

      // Photo frame
      const frame = createPhotoFrame();
      frame.position.set(0, 1.5, 0);
      group.add(frame);

      return group;
    }

    function createText(message) {
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      canvas.width = 1024;
      canvas.height = 512;

      const gradient = context.createLinearGradient(0, 0, canvas.width, 0);
      gradient.addColorStop(0, '#ff6b9d');
      gradient.addColorStop(0.5, '#667eea');
      gradient.addColorStop(1, '#764ba2');

      context.fillStyle = gradient;
      context.fillRect(0, 0, canvas.width, canvas.height);

      context.fillStyle = 'white';
      context.font = 'bold 72px Arial';
      context.textAlign = 'center';
      context.textBaseline = 'middle';

      const lines = message.split("\n");
      lines.forEach((line, i) => {
        context.fillText(line, canvas.width/2, 150 + i*150);
      });

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
      const geometry = new THREE.PlaneGeometry(2.5, 1.2);
      return new THREE.Mesh(geometry, material);
    }

    function addEmoji(group, emoji, position, scale=0.6) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 128;
      canvas.height = 128;
      ctx.font = '96px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, 64, 64);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
      const geometry = new THREE.PlaneGeometry(scale, scale);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(position[0], position[1], position[2]);
      group.add(mesh);
    }

    function createPhotoFrame() {
      const geometry = new THREE.PlaneGeometry(1.5, 1.5);
      const loader = new THREE.TextureLoader();
      const material = new THREE.MeshBasicMaterial({ map: loader.load('./test.jpeg'), transparent: true });
      return new THREE.Mesh(geometry, material);
    }

    function spawnConfetti(origin) {
      const colors = [0xff6b9d, 0x667eea, 0x764ba2, 0xffff00, 0x00ff00, 0xff0000];
      for (let i = 0; i < 30; i++) {
        const geometry = new THREE.PlaneGeometry(0.1, 0.1);
        const material = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random()*colors.length)] });
        const particle = new THREE.Mesh(geometry, material);
        particle.position.copy(origin);
        particle.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          Math.random() * 3 + 2,
          (Math.random() - 0.5) * 2
        );
        particle.life = 100 + Math.random() * 50;
        scene.add(particle);
        confettiParticles.push(particle);
      }
    }

    function onSelect() {
      if (reticle.visible) {
        if (birthdayGroup) {
          scene.remove(birthdayGroup);
        }
        birthdayGroup = createBirthdayGroup();
        birthdayGroup.position.setFromMatrixPosition(reticle.matrix);
        birthdayGroup.scale.set(0.001, 0.001, 0.001); // start tiny
        scene.add(birthdayGroup);

        // Start entrance animation
        spawnAnimationProgress = 0;
        isSpawning = true;

        // Confetti burst 🎊
        spawnConfetti(birthdayGroup.position.clone());
      }
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      renderer.setAnimationLoop(render);
    }

    function render(timestamp, frame) {
      if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (!hitTestSourceRequested) {
          session.requestReferenceSpace('viewer').then(function (refSpace) {
            session.requestHitTestSource({ space: refSpace }).then(function (source) {
              hitTestSource = source;
            });
          });
          session.addEventListener('end', function () {
            hitTestSourceRequested = false;
            hitTestSource = null;
          });
          hitTestSourceRequested = true;
        }

        if (hitTestSource) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);

          if (hitTestResults.length) {
            const hit = hitTestResults[0];
            reticle.visible = true;
            reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
          } else {
            reticle.visible = false;
          }
        }
      }

      // Animate birthday group spawn
      if (isSpawning && birthdayGroup) {
        spawnAnimationProgress += 0.02;
        const scale = Math.min(1, spawnAnimationProgress);
        birthdayGroup.scale.set(scale, scale, scale);
        if (scale >= 1) isSpawning = false;
      }

      // Gentle rotations and sparkle twinkles
      if (birthdayGroup) {
        birthdayGroup.children.forEach(child => {
          if (child.isMesh) {
            if (child.geometry.type === 'PlaneGeometry') {
              child.rotation.y += 0.002;
              if (child.material.opacity !== undefined && Math.random() > 0.98) {
                child.material.opacity = 0.7 + Math.random()*0.3;
              }
            }
          }
        });
      }

      // Update confetti
      confettiParticles.forEach((p, i) => {
        p.position.add(p.velocity.clone().multiplyScalar(0.02));
        p.velocity.y -= 0.05; // gravity
        p.life--;
        if (p.life <= 0) {
          scene.remove(p);
          confettiParticles.splice(i, 1);
        }
      });

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
